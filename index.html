<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of [Your Name] - [Your Role]">
  <title>Your Name | Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <!-- GSAP for premium animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>
  <nav class="nav">
    <div class="logo">YN</div>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button id="theme-toggle">🌙</button>
  </nav>

  <header class="hero">
    <h1 class="hero-title">Hi, I'm <span class="highlight">Your Name</span></h1>
    <p class="hero-subtitle">Full-Stack Developer crafting performant, user-centric web experiences.</p>
    <div class="hero-cta">
      <a href="#projects" class="btn primary">View My Work</a>
      <a href="assets/resume.pdf" class="btn secondary" download>Download CV</a>
    </div>
  </header>

  <section id="projects" class="section">
    <h2>Featured Projects</h2>
    <div class="filter-btns">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="web">Web</button>
      <button class="filter" data-filter="mobile">Mobile</button>
    </div>
    <div class="projects-grid" id="projects-container">
      <!-- JS will populate -->
    </div>
  </section>

  <section id="contact" class="section">
    <h2>Let's Build Something</h2>
    <form action="https://formspree.io/f/YOUR_ID" method="POST" class="contact-form">
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit" class="btn primary">Send Message</button>
    </form>
    <div id="qr-container" class="qr-section">
      <p>Scan to open on your phone</p>
      <div id="qr-code"></div>
    </div>
  </section>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</body>
</html>
